# Playwright E2E tests for restaurant-app.
#
# Before the first run, configure the repository under
# Settings → Secrets and variables → Actions:
#
#   Secrets:
#     SUPABASE_SERVICE_ROLE_KEY        Supabase service-role JWT (mints magic links)
#     NEXT_PUBLIC_SUPABASE_ANON_KEY    Supabase anon key
#
#   Variables:
#     NEXT_PUBLIC_SUPABASE_URL         e.g. https://sword33.duckdns.org
#     E2E_BASE_URL          (optional) override of deployed app URL
#                                      (defaults to https://eatlog.duckdns.org)
#     E2E_TEST_EMAIL        (optional) defaults to kwenhwang@gmail.com
#
# Tests run against the deployed app — no local build or dev server. Auth uses
# the headless magic-link flow in tests/e2e/auth.setup.ts (HEADED unset).

name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  # Cancel superseded PR pushes, but never cancel a push to main.
  group: e2e-${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  playwright:
    name: Playwright (chromium)
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    # Skip fork PRs — they don't have access to repo secrets and would fail
    # with confusing empty-env errors.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      CI: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
      E2E_TEST_EMAIL: ${{ vars.E2E_TEST_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight — required secrets/vars are set
        run: |
          missing=0
          for v in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Required env $v is empty. Configure it under repo Settings → Secrets and variables → Actions."
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Playwright version
        id: pw
        run: |
          version=$(pnpm exec playwright --version | awk '{print $2}')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-

      - name: Install Chromium (full, on cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install system deps (on cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results (traces, screenshots, video)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
