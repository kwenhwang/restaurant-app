# Playwright E2E tests for restaurant-app.
#
# Before the first run, configure the repository under
# Settings → Secrets and variables → Actions:
#
#   Secrets:
#     SUPABASE_SERVICE_ROLE_KEY        Supabase service-role JWT (mints magic links)
#     NEXT_PUBLIC_SUPABASE_ANON_KEY    Supabase anon key
#
#   Variables:
#     NEXT_PUBLIC_SUPABASE_URL         e.g. https://sword33.duckdns.org
#     E2E_BASE_URL          (optional) override of deployed app URL
#                                      (defaults to https://eatlog.duckdns.org)
#     E2E_TEST_EMAIL        (optional) defaults to kwenhwang@gmail.com
#
# Tests run against the deployed app — no local build or dev server. Auth uses
# the headless magic-link flow in tests/e2e/auth.setup.ts (HEADED unset).

name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel superseded PR pushes, but never cancel a push to main.
  group: e2e-${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  playwright:
    name: Playwright (chromium)
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    # Skip fork PRs — they don't have access to repo secrets and would fail
    # with confusing empty-env errors.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      CI: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
      E2E_TEST_EMAIL: ${{ vars.E2E_TEST_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight — required secrets/vars are set
        run: |
          missing=0
          for v in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Required env $v is empty. Configure it under repo Settings → Secrets and variables → Actions."
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests (vitest)
        run: pnpm test

      - name: Resolve Playwright version
        id: pw
        run: |
          version=$(pnpm exec playwright --version | awk '{print $2}')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-

      - name: Install Chromium (full, on cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install system deps (on cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results (traces, screenshots, video)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          EVENT: ${{ github.event_name }}
          SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message || github.event.pull_request.title }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_WEBHOOK_URL secret not set — skipping Slack notification."
            exit 0
          fi
          short_sha="${SHA:0:7}"
          # Truncate commit message to one line, 120 chars
          msg=$(printf '%s' "$COMMIT_MSG" | head -n1 | cut -c1-120)
          # Escape backslashes and double quotes for JSON
          msg_json=$(printf '%s' "$msg" | sed 's/\\/\\\\/g; s/"/\\"/g')
          payload=$(cat <<EOF
          {
            "text": "🚨 E2E 실패 — $REPO ($REF)",
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "🚨 E2E 실패", "emoji": true }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Repo*\n\`$REPO\`" },
                  { "type": "mrkdwn", "text": "*Branch*\n\`$REF\`" },
                  { "type": "mrkdwn", "text": "*Commit*\n\`$short_sha\` $msg_json" },
                  { "type": "mrkdwn", "text": "*Trigger*\n$EVENT by $ACTOR" }
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "style": "danger",
                    "text": { "type": "plain_text", "text": "View run logs", "emoji": false },
                    "url": "$RUN_URL"
                  }
                ]
              }
            ]
          }
          EOF
          )
          curl -sS -X POST -H "Content-Type: application/json" \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"
          echo "Slack notified."
